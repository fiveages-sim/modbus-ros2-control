# Runs in this repository (modbus-ros2-control) when pushed to GitHub.
# Clones arms_ros2_control for gripper, arms_ros2_control_msgs, arms_controller_common.
name: Build Modbus ROS2 Control Deb

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to upload the deb asset to
        required: false
        type: string
      ros_distro:
        description: ROS distro used in the install path
        required: false
        default: jazzy
        type: string

permissions:
  contents: write

jobs:
  build-deb:
    runs-on: ubuntu-24.04
    env:
      PACKAGE_NAME: arms-modbus-ros2-control-jazzy
      DEB_FILE_PREFIX: arms_modbus_ros2_control_jazzy
      ROS_PKG: modbus_ros2_control
      DEFAULT_ROS_DISTRO: jazzy
      ARMS_MONOREPO: fiveages-sim/arms_ros2_control

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: false

      - name: Resolve release metadata
        id: meta
        shell: bash
        env:
          INPUT_TAG: ${{ github.event.inputs.tag }}
          INPUT_ROS_DISTRO: ${{ github.event.inputs.ros_distro }}
        run: |
          set -eo pipefail
          if [[ -n "${INPUT_TAG:-}" ]]; then
            tag="$INPUT_TAG"
          elif [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            tag="${GITHUB_REF_NAME}"
          else
            echo "A release tag is required for workflow_dispatch." >&2
            exit 1
          fi
          if [[ "${tag}" != [vV]* ]]; then
            tag="v${tag}"
          fi
          version="${tag#v}"
          version="${version#V}"
          version="$(printf '%s' "$version" | sed 's/-/~/g')"
          ros_distro="${INPUT_ROS_DISTRO:-$DEFAULT_ROS_DISTRO}"
          deb_file="${DEB_FILE_PREFIX}_${version}_amd64.deb"
          install_prefix="/opt/ros/${ros_distro}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "ros_distro=$ros_distro" >> "$GITHUB_OUTPUT"
          echo "deb_file=$deb_file" >> "$GITHUB_OUTPUT"
          echo "install_prefix=$install_prefix" >> "$GITHUB_OUTPUT"

      - name: Install system tools
        shell: bash
        run: |
          set -eo pipefail
          sudo apt-get update
          sudo apt-get install -y curl gnupg lsb-release software-properties-common git pkg-config
          sudo add-apt-repository universe
          sudo mkdir -p /etc/apt/keyrings
          curl -fsSL https://raw.githubusercontent.com/ros/rosdistro/master/ros.key \
            | sudo gpg --dearmor -o /etc/apt/keyrings/ros-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/ros-archive-keyring.gpg] http://packages.ros.org/ros2/ubuntu $(. /etc/os-release && echo "${UBUNTU_CODENAME}") main" \
            | sudo tee /etc/apt/sources.list.d/ros2.list > /dev/null
          sudo apt-get update
          sudo apt-get install -y \
            python3-rosdep python3-colcon-core python3-colcon-common-extensions \
            fakeroot dpkg-dev rsync build-essential cmake \
            libmodbus-dev \
            ros-${{ steps.meta.outputs.ros_distro }}-ament-cmake \
            ros-${{ steps.meta.outputs.ros_distro }}-ament-cmake-core \
            ros-${{ steps.meta.outputs.ros_distro }}-ament-package \
            ros-${{ steps.meta.outputs.ros_distro }}-ros-base
          sudo rosdep init || true
          rosdep update
          source "/opt/ros/${{ steps.meta.outputs.ros_distro }}/setup.bash"
          python3 -c "import ament_package; print('ament_package ok')"

      - name: Fetch arms_ros2_control (dependency sources)
        shell: bash
        env:
          TOKEN: ${{ secrets.ARMS_MONOREPO_CHECKOUT_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          set -eo pipefail
          git clone --depth 1 "https://x-access-token:${TOKEN}@github.com/${ARMS_MONOREPO}.git" "${RUNNER_TEMP}/arms_ros2_control"

      - name: Prepare workspace
        shell: bash
        run: |
          set -eo pipefail
          ws="${RUNNER_TEMP}/modbus-ws"
          rm -rf "$ws"
          mkdir -p "$ws"
          rsync -a "${RUNNER_TEMP}/arms_ros2_control/libraries/gripper_hardware_common/" "${ws}/gripper_hardware_common/"
          rsync -a "${RUNNER_TEMP}/arms_ros2_control/command/arms_ros2_control_msgs/" "${ws}/arms_ros2_control_msgs/"
          rsync -a "${RUNNER_TEMP}/arms_ros2_control/libraries/arms_controller_common/" "${ws}/arms_controller_common/"
          rsync -a "${GITHUB_WORKSPACE}/" "${ws}/${ROS_PKG}/"

      - name: Install workspace dependencies (gripper)
        shell: bash
        env:
          ROS_DISTRO: ${{ steps.meta.outputs.ros_distro }}
        run: |
          set -eo pipefail
          source "/opt/ros/${ROS_DISTRO}/setup.bash"
          ros_python_path="/opt/ros/${ROS_DISTRO}/lib/python$(python3 -c 'import sys; print(str(sys.version_info.major) + "." + str(sys.version_info.minor))')/site-packages"
          export PYTHONPATH="${ros_python_path}:${PYTHONPATH:-}"
          rosdep install --from-paths "${RUNNER_TEMP}/modbus-ws/gripper_hardware_common" --ignore-src --rosdistro "${ROS_DISTRO}" --reinstall -r -y

      - name: Install workspace dependencies (stack)
        shell: bash
        env:
          ROS_DISTRO: ${{ steps.meta.outputs.ros_distro }}
        run: |
          set -eo pipefail
          source "/opt/ros/${ROS_DISTRO}/setup.bash"
          ros_python_path="/opt/ros/${ROS_DISTRO}/lib/python$(python3 -c 'import sys; print(str(sys.version_info.major) + "." + str(sys.version_info.minor))')/site-packages"
          export PYTHONPATH="${ros_python_path}:${PYTHONPATH:-}"
          rosdep install \
            --from-paths \
              "${RUNNER_TEMP}/modbus-ws/arms_ros2_control_msgs" \
              "${RUNNER_TEMP}/modbus-ws/arms_controller_common" \
              "${RUNNER_TEMP}/modbus-ws/${ROS_PKG}" \
            --ignore-src \
            --rosdistro "${ROS_DISTRO}" \
            --reinstall \
            -r \
            -y \
            --skip-keys \
              lina_planning

      - name: Build install space
        shell: bash
        env:
          ROS_DISTRO: ${{ steps.meta.outputs.ros_distro }}
          INSTALL_PREFIX: ${{ steps.meta.outputs.install_prefix }}
        run: |
          set -eo pipefail
          source "/opt/ros/${ROS_DISTRO}/setup.bash"
          ros_python_path="/opt/ros/${ROS_DISTRO}/lib/python$(python3 -c 'import sys; print(str(sys.version_info.major) + "." + str(sys.version_info.minor))')/site-packages"
          export PYTHONPATH="${ros_python_path}:${PYTHONPATH:-}"
          ws="${RUNNER_TEMP}/modbus-ws"
          build_root="${RUNNER_TEMP}/colcon-modbus"
          package_root="${RUNNER_TEMP}/deb-modbus/package"
          install_root="${package_root}${INSTALL_PREFIX}"
          rm -rf "$build_root" "$package_root"
          mkdir -p "$build_root" "$package_root"
          stage1="${RUNNER_TEMP}/stage1-gripper-modbus"
          rm -rf "$stage1"
          mkdir -p "$stage1"
          colcon --log-base "${build_root}/log-s1" build \
            --base-paths "${ws}/gripper_hardware_common" \
            --packages-select gripper_hardware_common \
            --build-base "${build_root}/build-s1" \
            --install-base "$stage1" \
            --merge-install
          source "$stage1/setup.bash"
          colcon --log-base "${build_root}/log-s2" build \
            --base-paths \
              "${ws}/arms_ros2_control_msgs" \
              "${ws}/arms_controller_common" \
              "${ws}/${ROS_PKG}" \
            --packages-select arms_ros2_control_msgs arms_controller_common "${ROS_PKG}" \
            --build-base "${build_root}/build-s2" \
            --install-base "${install_root}" \
            --merge-install
          python3 -c "import sys; exec('''import os\ninstall_root = sys.argv[1]\nruntime_prefix = sys.argv[2]\nfor dirpath, _, filenames in os.walk(install_root):\n    for filename in filenames:\n        path = os.path.join(dirpath, filename)\n        try:\n            with open(path, \"r\", encoding=\"utf-8\") as f:\n                content = f.read()\n        except Exception:\n            continue\n        if install_root not in content:\n            continue\n        with open(path, \"w\", encoding=\"utf-8\") as f:\n            f.write(content.replace(install_root, runtime_prefix))''')" "$install_root" "$INSTALL_PREFIX"
          rm -f \
            "${install_root}/setup.bash" "${install_root}/setup.sh" "${install_root}/setup.zsh" "${install_root}/setup.ps1" \
            "${install_root}/local_setup.bash" "${install_root}/local_setup.sh" "${install_root}/local_setup.zsh" "${install_root}/local_setup.ps1" \
            "${install_root}/_local_setup_util.py" "${install_root}/_local_setup_util_sh.py" "${install_root}/_local_setup_util_ps1.py" \
            "${install_root}/.colcon_install_layout" "${install_root}/COLCON_IGNORE"
          if [[ ! -d "${install_root}/share/ament_index/resource_index/packages" ]]; then
            echo "ament index missing." >&2
            exit 1
          fi

      - name: Build deb package
        id: build
        shell: bash
        env:
          ROS_DISTRO: ${{ steps.meta.outputs.ros_distro }}
          VERSION: ${{ steps.meta.outputs.version }}
          DEB_FILE: ${{ steps.meta.outputs.deb_file }}
          INSTALL_PREFIX: ${{ steps.meta.outputs.install_prefix }}
        run: |
          set -eo pipefail
          package_root="${RUNNER_TEMP}/deb-modbus/package"
          install_root="${package_root}${INSTALL_PREFIX}"
          mkdir -p "$package_root/DEBIAN"
          installed_size="$(du -sk "$package_root" | cut -f1)"
          cat > "$package_root/DEBIAN/control" <<EOF
          Package: ${PACKAGE_NAME}
          Version: ${VERSION}
          Section: misc
          Priority: optional
          Architecture: amd64
          Depends: ros-${ROS_DISTRO}-ros-base, arms-gripper-hardware-common-${ROS_DISTRO}
          Maintainer: ${GITHUB_REPOSITORY} maintainers <github-actions[bot]@users.noreply.github.com>
          Installed-Size: ${installed_size}
          Description: ${ROS_PKG} ROS 2 hardware plugin (standalone deb)
           Bundles arms_ros2_control_msgs and arms_controller_common from arms_ros2_control. Requires arms-gripper-hardware-common at runtime.
          EOF
          if [[ ! -d "${install_root}/share/${ROS_PKG}" ]]; then
            echo "Missing ${install_root}/share/${ROS_PKG}" >&2
            exit 1
          fi
          dpkg-deb --root-owner-group --build "$package_root" "$DEB_FILE"
          echo "deb_path=${GITHUB_WORKSPACE}/${DEB_FILE}" >> "$GITHUB_OUTPUT"

      - name: Upload deb to release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.meta.outputs.tag }}
          DEB_PATH: ${{ steps.build.outputs.deb_path }}
        run: |
          set -eo pipefail
          if ! gh release view "$TAG" > /dev/null 2>&1; then
            gh release create "$TAG" --title "$TAG" --notes "Automated Debian package build."
          fi
          gh release upload "$TAG" "$DEB_PATH" --clobber
